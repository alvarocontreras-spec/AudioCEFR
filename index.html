<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluador de Audio MCER - A2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Evaluador Oral MCER - Nivel A2</h1>
        <p class="subtitle">Graba tu respuesta a la tarea asignada para evaluar tu nivel según estándares oficiales.</p>

        <div class="api-box">
            <label for="apiKey">OpenAI API Key (Se guarda localmente):</label>
            <input type="password" id="apiKey" placeholder="sk-...">
        </div>

        <div class="task-box">
            <h3>Instrucciones de la Tarea A2:</h3>
            <textarea id="taskInstructions" rows="3" style="width: 100%; padding: 10px; box-sizing: border-box; border-radius: 4px; border: 1px solid #cbd5e0; font-family: inherit;" placeholder="Ejemplo: Describe tus últimas vacaciones. ¿A dónde fuiste y qué actividades hiciste?"></textarea>
        </div>

        <div class="audio-controls">
            <button id="btnStart">🔴 Iniciar Grabación</button>
            <button id="btnStop" disabled>⏹️ Detener</button>
        </div>

        <div class="upload-box" style="text-align: center; margin-bottom: 20px; padding: 10px; border: 2px dashed #bdc3c7; border-radius: 6px;">
            <label for="fileInput" style="font-weight: bold; display: block; margin-bottom: 5px; color: #34495e;">O sube un archivo de audio (MP3, WAV, M4A, WEBM):</label>
            <input type="file" id="fileInput" accept="audio/*">
        </div>

        <div class="status-box">
            <p id="status">Estado: Listo para grabar o subir archivo</p>
            <audio id="audioPlayback" controls></audio>
        </div>

        <button id="btnEvaluate" disabled>📊 Evaluar con IA</button>

        <hr>

        <div id="resultBox" class="result-box hidden">
            <h2>Resultados de la Evaluación</h2>
            <div id="evaluationOutput"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
