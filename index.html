<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluador de Audio MCER - A2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Evaluador Oral MCER - Nivel A2</h1>
        <p class="subtitle">Graba tu respuesta a la tarea asignada para evaluar tu nivel.</p>

        <div class="api-box">
            <label for="apiKey">OpenAI API Key (Se guarda localmente):</label>
            <input type="password" id="apiKey" placeholder="sk-...">
        </div>

        <div class="task-box">
            <h3>Tarea A2:</h3>
            <p><em>"Describe tu rutina diaria. ¿A qué hora te levantas, qué haces en la mañana y cómo vas a estudiar o trabajar?"</em></p>
        </div>

        <div class="audio-controls">
            <button id="btnStart">🔴 Iniciar Grabación</button>
            <button id="btnStop" disabled>⏹️ Detener</button>
        </div>

        <div class="status-box">
            <p id="status">Estado: Listo para grabar</p>
            <audio id="audioPlayback" controls></audio>
        </div>

        <button id="btnEvaluate" disabled>📊 Evaluar con IA</button>

        <hr>

        <div id="resultBox" class="result-box hidden">
            <h2>Resultados de la Evaluación</h2>
            <div id="evaluationOutput"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
